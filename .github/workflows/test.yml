name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev deps
        run: pip install -e '.[dev]'

      - name: Run unit tests
        run: pytest tests/test_mcp_unit.py tests/test_paid_mock.py -v

  live-discovery:
    runs-on: ubuntu-latest
    # Only run live tests on main branch pushes, not PRs
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev deps
        run: pip install -e '.[dev]'

      - name: Run live discovery tests
        run: pytest tests/test_discovery_live.py -v
        timeout-minutes: 2
